<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevForge OS | Ultimate Gemini Edition</title>

    <!-- UI Libraries & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- CodeMirror Core & Themes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/nord.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

    <!-- Project Tools: JSZip, HTMLHint, & Markdown Parser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmlhint@1.1.4/dist/htmlhint.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Segoe UI"', 'system-ui', 'sans-serif'],
                        mono: ['"Fira Code"', 'Consolas', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2560&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            user-select: none;
        }

        /* Glassmorphic / Acrylic styling panels */
        .fluent-acrylic-light { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(35px) saturate(160%); 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12); 
        }
        .dark .fluent-acrylic-dark { 
            background: rgba(20, 20, 24, 0.78); 
            backdrop-filter: blur(35px) saturate(160%); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); 
        }

        /* Desktop Windows Manager */
        .os-window { 
            position: absolute; 
            display: flex; 
            flex-direction: column; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: opacity 0.18s cubic-bezier(0.1, 0.9, 0.2, 1), transform 0.18s cubic-bezier(0.1, 0.9, 0.2, 1); 
            will-change: transform, width, height, top, left; 
        }
        .os-window.maximized { border-radius: 0 !important; border: none !important; }
        .os-window.minimized {
            opacity: 0;
            transform: scale(0.95) translateY(50px);
            pointer-events: none !important;
        }
        .window-header { height: 42px; display: flex; align-items: center; justify-content: space-between; padding-left: 14px; cursor: default; }
        
        .window-controls button { width: 46px; height: 42px; display: inline-flex; align-items: center; justify-content: center; transition: background 0.15s; }
        .window-controls button:hover { background: rgba(0, 0, 0, 0.06); }
        .dark .window-controls button:hover { background: rgba(255, 255, 255, 0.08); }
        .window-controls button.close-btn:hover { background: #e81123 !important; color: white !important; }

        .window-content { flex: 1; overflow: hidden; position: relative; background: #ffffff; display: flex; flex-direction: column; }
        .dark .window-content { background: #121215; }

        /* Custom OS Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(120, 120, 120, 0.3); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(120, 120, 120, 0.5); }

        #start-menu { transform: translateY(20px) scale(0.96); opacity: 0; pointer-events: none; transition: all 0.22s cubic-bezier(0.075, 0.82, 0.165, 1); }
        #start-menu.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

        /* Active resizing frames */
        body.resizing * { user-select: none !important; }
        body.resizing iframe { pointer-events: none !important; }

        /* CodeMirror Theme customized styles */
        .CodeMirror { height: 100% !important; font-family: 'Fira Code', 'Consolas', monospace; font-size: 14px; background: transparent !important; }
        .CodeMirror-gutters { background: #151518 !important; border-right: 1px solid #28282e !important; }
        
        /* Interactive Code Linters */
        .cm-error-squiggle {
            border-bottom: 2px dotted #f43f5e;
            background-color: rgba(244, 63, 94, 0.06);
            position: relative;
        }
        
        /* Collaborative Sync Cursor simulated */
        .remote-cursor {
            position: absolute;
            width: 2px;
            height: 18px;
            background-color: #8b5cf6;
            z-index: 10;
            pointer-events: none;
            transition: all 0.1s linear;
        }
        .remote-cursor-name {
            position: absolute;
            top: -18px;
            left: 0;
            background-color: #8b5cf6;
            color: white;
            font-size: 9px;
            font-weight: 600;
            padding: 1px 5px;
            border-radius: 4px 4px 4px 0;
            white-space: nowrap;
        }

        /* Fluent Alerts Toast Panel */
        .fluent-toast {
            animation: slideIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Custom CSS code rendering for markdown */
        .markdown-chat h1 { font-size: 1.25rem; font-weight: 700; margin-top: 0.5rem; margin-bottom: 0.25rem; }
        .markdown-chat h2 { font-size: 1.1rem; font-weight: 600; margin-top: 0.4rem; margin-bottom: 0.2rem; }
        .markdown-chat p { font-size: 0.8rem; margin-bottom: 0.5rem; line-height: 1.4; }
        .markdown-chat ul, .markdown-chat ol { margin-left: 1rem; margin-bottom: 0.5rem; list-style-type: decimal; }
        .markdown-chat code { font-family: 'Fira Code', monospace; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px; font-size: 0.75rem; }
        .markdown-chat pre { background: #0c0c0e; padding: 0.5rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; border: 1px solid rgba(255,255,255,0.1); }
        .markdown-chat pre code { background: transparent; padding: 0; }
    </style>
</head>
<body class="h-screen w-screen text-gray-950 dark:text-gray-100 dark font-sans">

    <!-- OS Shell root container -->
    <div id="os-root" class="relative w-full h-full flex flex-col select-none">
        
        <!-- Desktop Grid Shortcuts Area -->
        <div id="desktop" class="flex-1 relative p-4">
            <div class="grid grid-cols-1 gap-5 w-24 h-full content-start z-0">
                <button onclick="os.openApp('ide')" class="flex flex-col items-center gap-1.5 p-2 rounded-xl hover:bg-white/10 hover:backdrop-blur-md group transition-all text-white drop-shadow">
                    <img src="https://cdn-icons-png.flaticon.com/512/6132/6132222.png" class="w-11 h-11 group-hover:scale-105 transition-transform drop-shadow">
                    <span class="text-[11px] font-medium text-center drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)]">DevForge IDE</span>
                </button>
                <button onclick="os.openApp('scrumforge')" class="flex flex-col items-center gap-1.5 p-2 rounded-xl hover:bg-white/10 hover:backdrop-blur-md group transition-all text-white drop-shadow">
                    <img src="https://cdn-icons-png.flaticon.com/512/5024/5024467.png" class="w-11 h-11 group-hover:scale-105 transition-transform drop-shadow">
                    <span class="text-[11px] font-medium text-center drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)]">ScrumForge</span>
                </button>
                <button onclick="os.openApp('explorer')" class="flex flex-col items-center gap-1.5 p-2 rounded-xl hover:bg-white/10 hover:backdrop-blur-md group transition-all text-white drop-shadow">
                    <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png" class="w-11 h-11 group-hover:scale-105 transition-transform drop-shadow">
                    <span class="text-[11px] font-medium text-center drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)]">File Explorer</span>
                </button>
                <button onclick="os.openApp('assetforge')" class="flex flex-col items-center gap-1.5 p-2 rounded-xl hover:bg-white/10 hover:backdrop-blur-md group transition-all text-white drop-shadow">
                    <img src="https://cdn-icons-png.flaticon.com/512/2621/2621084.png" class="w-11 h-11 group-hover:scale-105 transition-transform drop-shadow">
                    <span class="text-[11px] font-medium text-center drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)]">Asset Forge</span>
                </button>
                <button onclick="os.openApp('voicebuddy')" class="flex flex-col items-center gap-1.5 p-2 rounded-xl hover:bg-white/10 hover:backdrop-blur-md group transition-all text-white drop-shadow">
                    <img src="https://cdn-icons-png.flaticon.com/512/2072/2072130.png" class="w-11 h-11 group-hover:scale-105 transition-transform drop-shadow">
                    <span class="text-[11px] font-medium text-center drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)]">Voice Buddy</span>
                </button>
                <button onclick="os.openApp('settings')" class="flex flex-col items-center gap-1.5 p-2 rounded-xl hover:bg-white/10 hover:backdrop-blur-md group transition-all text-white drop-shadow">
                    <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png" class="w-11 h-11 group-hover:scale-105 transition-transform drop-shadow">
                    <span class="text-[11px] font-medium text-center drop-shadow-[0_1px_3px_rgba(0,0,0,0.8)]">Settings</span>
                </button>
            </div>
            
            <!-- Window rendering Canvas wrapper -->
            <div id="window-container" class="absolute inset-0 pointer-events-none z-10"></div>
        </div>

        <!-- Notification Toast Canvas -->
        <div id="notification-canvas" class="absolute bottom-16 right-4 z-[10000] flex flex-col gap-2.5 max-w-sm pointer-events-none"></div>

        <!-- Custom Glass Confirm Dialog -->
        <div id="confirm-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100000] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-200">
            <div class="fluent-acrylic-light dark:fluent-acrylic-dark rounded-xl border border-white/20 p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-all duration-200">
                <h3 id="confirm-title" class="text-sm font-bold text-gray-900 dark:text-white mb-2">Confirm Action</h3>
                <p id="confirm-message" class="text-xs text-gray-500 dark:text-gray-300 mb-6">Are you sure you want to proceed?</p>
                <div class="flex justify-end gap-3 text-xs font-semibold">
                    <button id="btn-confirm-cancel" class="px-4 py-2 bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 rounded-lg text-gray-700 dark:text-gray-200 transition-colors">Cancel</button>
                    <button id="btn-confirm-ok" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg transition-colors">Confirm</button>
                </div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu" class="absolute bottom-16 left-1/2 -translate-x-1/2 w-[580px] h-[520px] fluent-acrylic-light dark:fluent-acrylic-dark rounded-xl flex flex-col z-[9998] border shadow-2xl">
            <div class="p-6 pb-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="start-menu-search" oninput="os.filterStartMenu(this.value)" placeholder="Search for applications or settings..." class="w-full bg-white/40 dark:bg-black/30 border border-black/10 dark:border-white/10 rounded-lg py-2 pl-11 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-gray-900 dark:text-white">
                </div>
            </div>
            <div class="flex-1 px-6 py-2 overflow-y-auto">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-[11px] font-semibold text-gray-400 dark:text-gray-400 uppercase tracking-wider">Workspace Pinned</h3>
                </div>
                <div id="pinned-apps-grid" class="grid grid-cols-4 gap-4">
                    <button onclick="os.openApp('ide'); os.toggleStartMenu()" class="flex flex-col items-center gap-2 hover:bg-black/5 dark:hover:bg-white/5 p-3 rounded-xl transition-all">
                        <img src="https://cdn-icons-png.flaticon.com/512/6132/6132222.png" class="w-9 h-9">
                        <span class="text-xs font-medium">DevForge IDE</span>
                    </button>
                    <button onclick="os.openApp('scrumforge'); os.toggleStartMenu()" class="flex flex-col items-center gap-2 hover:bg-black/5 dark:hover:bg-white/5 p-3 rounded-xl transition-all">
                        <img src="https://cdn-icons-png.flaticon.com/512/5024/5024467.png" class="w-9 h-9">
                        <span class="text-xs font-medium">ScrumForge</span>
                    </button>
                    <button onclick="os.openApp('explorer'); os.toggleStartMenu()" class="flex flex-col items-center gap-2 hover:bg-black/5 dark:hover:bg-white/5 p-3 rounded-xl transition-all">
                        <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png" class="w-9 h-9">
                        <span class="text-xs font-medium">File Explorer</span>
                    </button>
                    <button onclick="os.openApp('assetforge'); os.toggleStartMenu()" class="flex flex-col items-center gap-2 hover:bg-black/5 dark:hover:bg-white/5 p-3 rounded-xl transition-all">
                        <img src="https://cdn-icons-png.flaticon.com/512/2621/2621084.png" class="w-9 h-9">
                        <span class="text-xs font-medium">Asset Forge</span>
                    </button>
                    <button onclick="os.openApp('voicebuddy'); os.toggleStartMenu()" class="flex flex-col items-center gap-2 hover:bg-black/5 dark:hover:bg-white/5 p-3 rounded-xl transition-all">
                        <img src="https://cdn-icons-png.flaticon.com/512/2072/2072130.png" class="w-9 h-9">
                        <span class="text-xs font-medium">Voice Buddy</span>
                    </button>
                    <button onclick="os.openApp('settings'); os.toggleStartMenu()" class="flex flex-col items-center gap-2 hover:bg-black/5 dark:hover:bg-white/5 p-3 rounded-xl transition-all">
                        <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png" class="w-9 h-9">
                        <span class="text-xs font-medium">Settings</span>
                    </button>
                </div>
            </div>
            <div class="mt-auto h-14 bg-black/5 dark:bg-white/5 rounded-b-xl border-t border-black/5 dark:border-white/5 flex justify-between items-center px-6 text-xs">
                <div class="flex items-center gap-3">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=0284c7&color=fff" class="w-7 h-7 rounded-full border border-white/20">
                    <span class="font-semibold text-gray-800 dark:text-gray-200">DevForge Workspace</span>
                </div>
                <button onclick="location.reload()" title="Restart Workspace Host" class="w-7 h-7 rounded-lg flex items-center justify-center hover:bg-white/10 text-gray-400 hover:text-white transition-all"><i class="fas fa-arrow-rotate-right"></i></button>
            </div>
        </div>

        <!-- Taskbar Layout -->
        <div id="taskbar" class="h-12 w-full fluent-acrylic-light dark:fluent-acrylic-dark z-[9999] flex items-center justify-between px-3 border-t border-white/20 dark:border-white/10">
            <div class="flex items-center w-[160px] pl-1 hover:bg-black/5 dark:hover:bg-white/5 h-9 rounded cursor-pointer transition-colors">
                <i class="fas fa-microchip text-indigo-500 mr-2 animate-pulse"></i>
                <div class="flex flex-col leading-none">
                    <span class="text-[10px] font-semibold text-gray-800 dark:text-white" id="api-status-label">API Standby</span>
                    <span class="text-[9px] text-gray-500 dark:text-gray-400">Gemini 3.5 Engine</span>
                </div>
            </div>
            <div id="taskbar-apps" class="flex items-center gap-1.5 h-full">
                <button id="start-btn" onclick="os.toggleStartMenu(event)" class="w-9 h-9 flex items-center justify-center rounded hover:bg-white/25 transition-colors relative">
                    <svg viewBox="0 0 87 87" fill="none" class="w-4.5 h-4.5"><path d="M41 3H3V41H41V3Z" fill="#8b5cf6"/><path d="M84 3H46V41H84V3Z" fill="#3b82f6"/><path d="M41 46H3V84H41V46Z" fill="#3b82f6"/><path d="M84 46H46V84H84V46Z" fill="#8b5cf6"/></svg>
                </button>
            </div>
            <div class="flex items-center justify-end w-[160px] gap-2 pr-1">
                <div class="flex flex-col items-end justify-center hover:bg-black/5 dark:hover:bg-white/5 h-9 px-2 rounded cursor-pointer select-none transition-colors">
                    <span id="clock-time" class="text-[10px] font-semibold text-gray-800 dark:text-white">12:00 PM</span>
                    <span id="clock-date" class="text-[9px] text-gray-500 dark:text-gray-400">7/17/2026</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Template: IDE -->
    <template id="app-ide">
        <div class="flex h-full w-full bg-[#1b1b1e] text-white overflow-hidden relative font-sans">
            <!-- Collaborative Header Overlay -->
            <div class="absolute top-2 right-4 z-40 flex items-center gap-2">
                <div class="flex -space-x-1.5">
                    <img class="w-5.5 h-5.5 rounded-full border border-[#1b1b1e]" src="https://ui-avatars.com/api/?name=Admin&background=0284c7&color=fff" title="You">
                    <img class="w-5.5 h-5.5 rounded-full border border-[#1b1b1e] animate-pulse" src="https://ui-avatars.com/api/?name=Gemini&background=8b5cf6&color=fff" title="Gemini Core">
                </div>
                <div class="text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-0.5 rounded-full font-medium">Gemini Link Engaged</div>
            </div>

            <!-- Virtual File System Explorer -->
            <div id="ide-sidebar-panel" class="bg-[#141416] border-r border-[#2d2d32] flex flex-col shrink-0" style="width: 210px;">
                <div class="p-3 text-[10px] font-bold text-gray-400 uppercase tracking-wider flex justify-between items-center">
                    <span>Explorer</span>
                    <div class="flex gap-1.5">
                        <button onclick="ideApp.createNewFile()" title="Create File" class="hover:text-white transition-colors"><i class="fas fa-file-circle-plus"></i></button>
                        <button onclick="ideApp.exportZip()" title="Download ZIP" class="hover:text-white transition-colors"><i class="fas fa-file-zipper"></i></button>
                    </div>
                </div>
                <div id="ide-file-tree" class="flex flex-col text-xs flex-1 overflow-y-auto pb-4">
                    <!-- Dynamic Files -->
                </div>
            </div>
            
            <div id="ide-splitter-1" class="w-1 bg-[#232326] hover:bg-purple-600 cursor-col-resize shrink-0 transition-colors"></div>

            <!-- Core Coding Workspace -->
            <div id="ide-editor-panel" class="flex-1 flex flex-row relative min-w-0">
                <div class="flex-1 flex flex-col relative min-w-0">
                    <!-- Tabbed Header -->
                    <div class="h-10 bg-[#19191c] flex items-center border-b border-[#2d2d32] justify-between pr-4">
                        <div id="ide-tabs" class="flex h-full overflow-x-auto select-none">
                            <!-- Injected Active tabs -->
                        </div>
                        <div class="flex gap-1">
                            <button onclick="ideApp.explainCodeAudio()" class="text-[9px] uppercase font-bold px-2 py-1 bg-emerald-700 hover:bg-emerald-600 text-white rounded transition-colors shadow" title="AI Voice Explanation"><i class="fas fa-headphones mr-1"></i> Explain</button>
                            <button onclick="ideApp.reviewCode()" class="text-[9px] uppercase font-bold px-2 py-1 bg-amber-600 hover:bg-amber-500 text-white rounded transition-colors shadow" title="Structured Linting Review"><i class="fas fa-clipboard-check mr-1"></i> Review</button>
                            <button onclick="ideApp.documentCode()" class="text-[9px] uppercase font-bold px-2 py-1 bg-sky-600 hover:bg-sky-500 text-white rounded transition-colors shadow" title="Comment & Document Layout"><i class="fas fa-file-alt mr-1"></i> Doc</button>
                            <button onclick="ideApp.toggleChatPanel()" class="text-[9px] uppercase font-bold px-2 py-1 bg-purple-700 hover:bg-purple-600 text-white rounded transition-colors shadow" title="Open Gemini Chat"><i class="fas fa-sparkles mr-1"></i> Chat</button>
                            <button onclick="ideApp.updatePreview()" class="text-[9px] uppercase font-bold px-2.5 py-1 bg-blue-600 hover:bg-blue-500 text-white rounded transition-colors shadow"><i class="fas fa-play mr-1"></i> Run</button>
                        </div>
                    </div>

                    <!-- CodeMirror Container -->
                    <div class="flex-1 relative bg-[#1b1b1e]" id="cm-container">
                        <textarea id="cm-editor-instance"></textarea>
                        
                        <!-- Collab Remote Cursor Simulator -->
                        <div id="live-cursor-agent" class="remote-cursor hidden">
                            <div class="remote-cursor-name">Gemini</div>
                        </div>
                    </div>

                    <!-- Sandbox Output Bar -->
                    <div class="h-9 bg-[#131315] border-t border-[#2d2d32] flex items-center px-3 justify-between text-xs font-mono">
                        <div class="flex items-center gap-2 text-gray-400" id="lint-status">
                            <span><i class="fas fa-check-circle text-emerald-500"></i> Workspace loaded</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="btn-autofix" onclick="ideApp.geminiAutoFix()" class="hidden px-2 py-0.5 bg-gradient-to-r from-purple-600 to-blue-600 rounded text-white font-semibold hover:opacity-95 transition-all text-[10px]">✨ Auto-Fix</button>
                            <span class="text-gray-500" id="file-lang-label">HTML</span>
                        </div>
                    </div>
                </div>

                <!-- Chat Sidebar Overlay -->
                <div id="ide-chat-panel" class="w-80 bg-[#141416] border-l border-[#2d2d32] flex flex-col hidden">
                    <div class="h-10 border-b border-[#2d2d32] px-3 flex items-center justify-between">
                        <span class="text-xs font-bold text-purple-400 uppercase tracking-wider"><i class="fas fa-robot mr-1"></i> Gemini Copilot</span>
                        <button onclick="ideApp.toggleChatPanel()" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
                    </div>
                    <!-- Messages Box -->
                    <div id="ide-chat-messages" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3 text-xs markdown-chat">
                        <div class="bg-[#1b1b1e] p-2.5 rounded-lg border border-white/5 text-gray-300">

    <script>
        // --- STREAMING_CHUNK: Configuring Global API Keys and Audio utilities... ---
        // Setup central state for API endpoints
        let geminiApiKey = localStorage.getItem('devforge_api_key') || "";

        function getApiKey() {
            // Priority: User customized key -> Canvas default injection string fallback
            return geminiApiKey || "";
        }

        // Base64 helper conversion layers
        function base64ToArrayBuffer(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binary_string.charCodeAt(i);
            return bytes.buffer;
        }

        // Custom PCM conversion system (WAV container structure)
        function pcmToWav(pcm16, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = pcm16.byteLength;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            const outView = new Uint8Array(buffer, 44);
            outView.set(new Uint8Array(pcm16.buffer, pcm16.byteOffset, pcm16.byteLength));
            
            return new Blob([buffer], { type: 'audio/wav' });
        }

        // Virtual Storage State Setup
        const defaultVFS = {
            'index.html': `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Portfolio Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Welcome to DevForge OS</h1>
        <p>This virtual workspace updates dynamically as you type.</p>
        <button id="hello-btn" class="glow-btn">Interact with Code</button>
    </div>
    <script src="app.js"><\/script>
</body>
</html>`,
            'style.css': `body {
    background-color: #0b0f19;
    color: #f1f5f9;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.card {
    text-align: center;
    padding: 2.5rem;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.glow-btn {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white;
    padding: 12px 24px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}`,
            'app.js': `console.log("Workspace initiated successfully.");\n\ndocument.getElementById('hello-btn')?.addEventListener('click', () => {\n    console.log("Interactive event parsed successfully!");\n});`,
            'readme.md': `# DevForge Workspace Project\n\n- Build complex HTML/JS interfaces dynamically.\n- Review files using multi-turn image generation maps.\n- Access integrated linting frameworks instantly.`
        };

        const VFS = localStorage.getItem('devforge_vfs_v4') ? JSON.parse(localStorage.getItem('devforge_vfs_v4')) : defaultVFS;

        function saveVFS() {
            localStorage.setItem('devforge_vfs_v4', JSON.stringify(VFS));
        }

        const fileIcons = {
            'html': '<i class="fab fa-html5 text-orange-500"></i>',
            'css': '<i class="fab fa-css3-alt text-blue-400"></i>',
            'js': '<i class="fab fa-js text-yellow-400"></i>',
            'json': '<i class="fas fa-code text-green-400"></i>',
            'md': '<i class="fab fa-markdown text-sky-400"></i>'
        };

        // --- STREAMING_CHUNK: Structuring Central OS Event Loop and Window drag handlers... ---
        // OS Core Manager
        const os = {
            zIndexCounter: 100,
            windows: {},
            apps: {
                'ide': { title: 'DevForge IDE', templateId: 'app-ide', width: 1000, height: 600, script: 'ideApp.init()' },
                'scrumforge': { title: 'ScrumForge Board', templateId: 'app-scrumforge', width: 750, height: 500, script: 'scrumForgeApp.init()' },
                'explorer': { title: 'File Explorer', templateId: 'app-explorer', width: 680, height: 420, script: 'explorerApp.init()' },
                'assetforge': { title: 'Asset Forge', templateId: 'app-asset-forge', width: 600, height: 480, script: 'assetForgeApp.init()' },
                'voicebuddy': { title: 'Voice Buddy', templateId: 'app-voice-buddy', width: 380, height: 450, script: 'voiceBuddyApp.init()' },
                'settings': { title: 'Settings', templateId: 'app-settings', width: 600, height: 400, script: 'settingsApp.init()' }
            },

            toggleStartMenu(e) {
                if(e) e.stopPropagation();
                document.getElementById('start-menu').classList.toggle('open');
            },

            filterStartMenu(val) {
                const grid = document.getElementById('pinned-apps-grid');
                if(!grid) return;
                const buttons = grid.getElementsByTagName('button');
                for (let btn of buttons) {
                    const text = btn.querySelector('span').innerText.toLowerCase();
                    if(text.includes(val.toLowerCase())) {
                        btn.style.display = 'flex';
                    } else {
                        btn.style.display = 'none';
                    }
                }
            },

            confirm(title, message, onConfirm) {
                const modal = document.getElementById('confirm-modal');
                const modalBox = modal.querySelector('div');
                document.getElementById('confirm-title').innerText = title;
                document.getElementById('confirm-message').innerText = message;
                
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modalBox.classList.remove('scale-95');

                const cancelBtn = document.getElementById('btn-confirm-cancel');
                const okBtn = document.getElementById('btn-confirm-ok');

                const cleanup = () => {
                    modal.classList.add('opacity-0', 'pointer-events-none');
                    modalBox.classList.add('scale-95');
                };

                cancelBtn.onclick = () => cleanup();
                okBtn.onclick = () => {
                    cleanup();
                    if(onConfirm) onConfirm();
                };
            },

            showNotification(title, text, type = 'info') {
                const canvas = document.getElementById('notification-canvas');
                if (!canvas) return;

                const colors = {
                    info: 'bg-indigo-600/15 border-indigo-500/20 text-indigo-100',
                    success: 'bg-emerald-600/15 border-emerald-500/20 text-emerald-100',
                    warn: 'bg-amber-600/15 border-amber-500/20 text-amber-100',
                    error: 'bg-red-600/15 border-red-500/20 text-red-100'
                };

                const icons = {
                    info: '<i class="fas fa-info-circle text-indigo-400"></i>',
                    success: '<i class="fas fa-circle-check text-emerald-400"></i>',
                    warn: '<i class="fas fa-circle-exclamation text-amber-400"></i>',
                    error: '<i class="fas fa-circle-xmark text-red-400"></i>'
                };

                const toast = document.createElement('div');
                toast.className = `fluent-toast flex items-start gap-3 p-3.5 rounded-xl border backdrop-blur-md shadow-lg ${colors[type] || colors.info} select-text pointer-events-auto`;
                toast.innerHTML = `
                    <div class="mt-0.5 text-sm">${icons[type] || icons.info}</div>
                    <div class="flex-1 text-xs">
                        <div class="font-bold mb-0.5">${title}</div>
                        <div class="opacity-80">${text}</div>
                    </div>
                `;
                canvas.appendChild(toast);
                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) reverse';
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            },

            // --- STREAMING_CHUNK: Managing desktop window instances and viewport tracking... ---
            openApp(appId) {
                if (this.windows[appId]) {
                    this.restoreWindow(appId);
                    return;
                }

                const app = this.apps[appId];
                if (!app) return;

                const winId = appId;
                const win = document.createElement('div');
                win.id = `window-${winId}`;
                win.className = 'os-window fluent-acrylic-light dark:fluent-acrylic-dark shadow-2xl border border-white/10 select-none';
                win.style.width = `${app.width}px`;
                win.style.height = `${app.height}px`;
                
                const container = document.getElementById('window-container');
                const x = Math.max(10, (container.clientWidth - app.width) / 2 + (Object.keys(this.windows).length * 20));
                const y = Math.max(10, (container.clientHeight - app.height) / 2 + (Object.keys(this.windows).length * 20));
                
                win.style.left = `${x}px`;
                win.style.top = `${y}px`;
                win.style.zIndex = ++this.zIndexCounter;

                let contentHtml = '';
                if (app.templateId) {
                    const template = document.getElementById(app.templateId);
                    if (template) contentHtml = template.innerHTML;
                }

                win.innerHTML = `
                    <div class="window-header bg-white/40 dark:bg-black/45 backdrop-blur-md border-b border-black/5 dark:border-white/5" 
                         onmousedown="os.startDrag(event, '${winId}')" ontouchstart="os.startDrag(event, '${winId}')">
                        <span class="text-xs font-semibold tracking-wide flex items-center gap-1.5 text-gray-900 dark:text-white">${app.title}</span>
                        <div class="window-controls flex">
                            <button onclick="os.minimizeWindow('${winId}')" class="text-gray-600 dark:text-gray-300"><i class="fas fa-minus text-[10px]"></i></button>
                            <button onclick="os.maximizeWindow('${winId}')" class="text-gray-600 dark:text-gray-300"><i class="far fa-square text-[10px]"></i></button>
                            <button onclick="os.closeWindow('${winId}')" class="close-btn text-gray-600 dark:text-gray-300"><i class="fas fa-times text-[11px]"></i></button>
                        </div>
                    </div>
                    <div class="window-content pointer-events-auto">
                        ${contentHtml}
                    </div>
                `;

                win.addEventListener('mousedown', () => this.focusWindow(winId));
                win.addEventListener('touchstart', () => this.focusWindow(winId), {passive: true});
                container.appendChild(win);
                this.windows[winId] = { el: win, isMaximized: false, prevRect: {} };
                
                this.addToTaskbar(winId, app.title);
                this.focusWindow(winId);

                if (app.script) {
                    setTimeout(() => {
                        try { eval(app.script); } catch (e) { console.error(e); }
                    }, 50);
                }
            },

            closeWindow(id) {
                if (this.windows[id]) {
                    this.windows[id].el.remove();
                    delete this.windows[id];
                    this.removeFromTaskbar(id);
                }
            },

            focusWindow(id) {
                if (this.windows[id]) {
                    this.windows[id].el.style.zIndex = ++this.zIndexCounter;
                    document.querySelectorAll('#taskbar-apps button').forEach(b => b.classList.remove('bg-white/20'));
                    const tbBtn = document.getElementById(`tb-${id}`);
                    if (tbBtn) tbBtn.classList.add('bg-white/20');
                }
            },

            maximizeWindow(id) {
                const win = this.windows[id];
                if (!win) return;
                
                if (win.isMaximized) {
                    win.el.style.width = win.prevRect.width;
                    win.el.style.height = win.prevRect.height;
                    win.el.style.top = win.prevRect.top;
                    win.el.style.left = win.prevRect.left;
                    win.el.classList.remove('maximized');
                    win.isMaximized = false;
                } else {
                    win.prevRect = {
                        width: win.el.style.width,
                        height: win.el.style.height,
                        top: win.el.style.top,
                        left: win.el.style.left
                    };
                    win.el.style.width = '100%';
                    win.el.style.height = 'calc(100% - 48px)';
                    win.el.style.top = '0';
                    win.el.style.left = '0';
                    win.el.classList.add('maximized');
                    win.isMaximized = true;
                }
            },
            
            minimizeWindow(id) {
                if (this.windows[id]) this.windows[id].el.classList.add('minimized');
            },

            restoreWindow(id) {
                if(this.windows[id]) {
                    this.windows[id].el.classList.remove('minimized');
                    this.focusWindow(id);
                }
            },

            startDrag(e, id) {
                if (e.target.closest('.window-controls')) return;
                const win = this.windows[id];
                if (!win || win.isMaximized) return;

                const el = win.el;
                const isTouch = e.type.startsWith('touch');
                const clientX = isTouch ? e.touches[0].clientX : e.clientX;
                const clientY = isTouch ? e.touches[0].clientY : e.clientY;

                const startLeft = parseInt(el.style.left) || 0;
                const startTop = parseInt(el.style.top) || 0;

                const doDrag = (dragEvent) => {
                    const currentX = isTouch ? dragEvent.touches[0].clientX : dragEvent.clientX;
                    const currentY = isTouch ? dragEvent.touches[0].clientY : dragEvent.clientY;
                    el.style.left = `${startLeft + currentX - clientX}px`;
                    el.style.top = `${startTop + currentY - clientY}px`;
                };

                const stopDrag = () => {
                    document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', doDrag);
                    document.removeEventListener(isTouch ? 'touchend' : 'mouseup', stopDrag);
                    document.body.classList.remove('resizing');
                };

                document.body.classList.add('resizing');
                document.addEventListener(isTouch ? 'touchmove' : 'mousemove', doDrag, {passive: !isTouch});
                document.addEventListener(isTouch ? 'touchend' : 'mouseup', stopDrag);
                this.focusWindow(id);
            },

            addToTaskbar(id, title) {
                const tb = document.getElementById('taskbar-apps');
                if (!tb) return;
                const btn = document.createElement('button');
                btn.id = `tb-${id}`;
                btn.className = 'px-3 h-9 flex items-center justify-center rounded hover:bg-white/10 transition-all text-xs font-semibold bg-white/10 text-white max-w-[130px] truncate';
                btn.innerText = title;
                btn.onclick = () => {
                    const el = this.windows[id].el;
                    if(el.classList.contains('minimized')) {
                        this.restoreWindow(id);
                    } else if(parseInt(el.style.zIndex) === this.zIndexCounter) {
                        this.minimizeWindow(id);
                    } else {
                        this.focusWindow(id);
                    }
                };
                tb.appendChild(btn);
            },

            removeFromTaskbar(id) {
                const btn = document.getElementById(`tb-${id}`);
                if (btn) btn.remove();
            },

            updateStatus() {
                const label = document.getElementById('api-status-label');
                if (!label) return;
                if (getApiKey()) {
                    label.innerText = "Gemini Engaged";
                    label.className = "text-[10px] font-semibold text-emerald-400";
                } else {
                    label.innerText = "Sandbox Active";
                    label.className = "text-[10px] font-semibold text-purple-400";
                }
            }
        };

        // --- STREAMING_CHUNK: Initializing IDE environment controllers... ---
        // IDE Application Management
        const ideApp = {
            editor: null,
            currentFile: 'index.html',
            cursorTimeout: null,
            
            init() {
                const textArea = document.getElementById('cm-editor-instance');
                if(!textArea) return;

                this.editor = CodeMirror.fromTextArea(textArea, {
                    lineNumbers: true,
                    theme: 'nord',
                    mode: 'htmlmixed',
                    indentUnit: 4,
                    matchBrackets: true,
                    autoCloseTags: true,
                    viewportMargin: Infinity
                });

                this.editor.on('change', () => {
                    VFS[this.currentFile] = this.editor.getValue();
                    saveVFS();
                    this.runLinting();
                    this.simulateCursor();
                });

                this.renderFileTree();
                this.openFile('index.html');
                this.setupSplitters();
                this.updatePreview();
                this.setupTerminal();
            },

            renderFileTree() {
                const tree = document.getElementById('ide-file-tree');
                if(!tree) return;
                tree.innerHTML = '';
                
                Object.keys(VFS).sort().forEach(filename => {
                    const ext = filename.split('.').pop();
                    const icon = fileIcons[ext] || '<i class="fas fa-file text-gray-400"></i>';
                    const isActive = filename === this.currentFile;
                    
                    const el = document.createElement('div');
                    el.className = `flex items-center gap-2 px-3 py-1.5 cursor-pointer hover:bg-white/5 transition-colors ${isActive ? 'bg-white/10 text-purple-400 font-bold border-l-2 border-purple-500' : 'text-gray-400'}`;
                    el.innerHTML = `${icon} <span class="truncate text-[11px]">${filename}</span>
                                    <button onclick="event.stopPropagation(); ideApp.deleteFile('${filename}')" class="ml-auto opacity-0 group-hover:opacity-100 hover:text-rose-400"><i class="fas fa-trash text-[10px]"></i></button>`;
                    el.classList.add('group');
                    el.onclick = () => this.openFile(filename);
                    tree.appendChild(el);
                });
                this.renderTabs();
            },

            renderTabs() {
                const tabsContainer = document.getElementById('ide-tabs');
                if(!tabsContainer) return;
                tabsContainer.innerHTML = '';
                
                Object.keys(VFS).forEach(filename => {
                    const isActive = filename === this.currentFile;
                    const el = document.createElement('div');
                    el.className = `px-3.5 h-full flex items-center border-r border-[#2d2d32] cursor-pointer text-xs gap-2 ${isActive ? 'bg-[#1b1b1e] text-purple-400 border-t-2 border-t-purple-500 font-semibold' : 'bg-[#141416] text-gray-400 hover:bg-[#1b1b1e]'}`;
                    el.innerHTML = `<span>${filename}</span> <button onclick="event.stopPropagation(); ideApp.deleteFile('${filename}')" class="hover:text-red-400 ml-1 rounded-full text-[10px]"><i class="fas fa-times"></i></button>`;
                    el.onclick = () => this.openFile(filename);
                    tabsContainer.appendChild(el);
                });
            },

            openFile(filename) {
                if (!VFS[filename]) return;
                this.currentFile = filename;
                
                const ext = filename.split('.').pop();
                let mode = 'htmlmixed';
                if (ext === 'js') mode = 'javascript';
                if (ext === 'css') mode = 'css';
                if (ext === 'json') mode = 'application/json';
                
                this.editor.setOption('mode', mode);
                const fileLangEl = document.getElementById('file-lang-label');
                if (fileLangEl) fileLangEl.innerText = ext.toUpperCase();
                
                this.editor.setValue(VFS[filename]);
                this.renderFileTree();
                this.runLinting();

                const chatActiveEl = document.getElementById('chat-active-file');
                if (chatActiveEl) chatActiveEl.innerText = filename;
            },

            createNewFile() {
                const filename = prompt("Enter new filename (e.g. style.css):");
                if (filename && !VFS[filename]) {
                    VFS[filename] = '';
                    saveVFS();
                    this.openFile(filename);
                    os.showNotification("VFS File Created", `${filename} is ready to write.`, "success");
                }
            },
            
            deleteFile(filename) {
                if(Object.keys(VFS).length <= 1) {
                    this.logToConsole("Terminal Error: cannot delete the only existing VFS module.", "error");
                    return;
                }
                os.confirm("Confirm File Deletion", `Are you sure you want to delete ${filename}?`, () => {
                    delete VFS[filename];
                    saveVFS();
                    if(this.currentFile === filename) {
                        this.openFile(Object.keys(VFS)[0]);
                    } else {
                        this.renderFileTree();
                    }
                    os.showNotification("VFS File Removed", `${filename} was deleted.`, "warn");
                });
            },

            // --- STREAMING_CHUNK: Implementing dynamic linting rules and responsive splitters... ---
            runLinting() {
                const code = this.editor.getValue();
                const statusEl = document.getElementById('lint-status');
                const autofixBtn = document.getElementById('btn-autofix');
                const ext = this.currentFile.split('.').pop();
                
                this.editor.getAllMarks().forEach(mark => mark.clear());

                if (ext === 'html') {
                    try {
                        const linter = window.HTMLHint || (window.HTMLHint && window.HTMLHint.HTMLHint);
                        const verifyFunc = linter ? (linter.verify || (linter.HTMLHint && linter.HTMLHint.verify)) : null;

                        if (typeof verifyFunc === 'function') {
                            const results = verifyFunc.call(linter, code, {
                                "tag-pair": true,
                                "tagname-lowercase": true,
                                "attr-lowercase": true,
                                "attr-value-double-quotes": true
                            });
                            
                            if (results && results.length > 0) {
                                statusEl.innerHTML = `<span class="text-rose-400 font-medium"><i class="fas fa-circle-exclamation"></i> ${results.length} layout warnings</span>`;
                                autofixBtn.classList.remove('hidden');
                                
                                results.forEach(err => {
                                    this.editor.markText(
                                        {line: err.line - 1, ch: err.col - 1},
                                        {line: err.line - 1, ch: err.col + 5},
                                        {className: "cm-error-squiggle", title: err.message}
                                    );
                                });
                            } else {
                                statusEl.innerHTML = `<span><i class="fas fa-check-circle text-emerald-500"></i> Code is healthy</span>`;
                                autofixBtn.classList.add('hidden');
                            }
                        }
                    } catch (err) {
                        console.warn("Linter warning:", err);
                    }
                } else if (ext === 'js') {
                    try {
                        new Function(code);
                        statusEl.innerHTML = `<span><i class="fas fa-check-circle text-emerald-500"></i> Parser verified</span>`;
                        autofixBtn.classList.add('hidden');
                    } catch (e) {
                        statusEl.innerHTML = `<span class="text-rose-400 font-medium"><i class="fas fa-circle-exclamation"></i> Syntax warning</span>`;
                        autofixBtn.classList.remove('hidden');
                    }
                }
            },

            setupSplitters() {
                const setupResizer = (resizerId, prevId, nextId, isHorizontal) => {
                    const resizer = document.getElementById(resizerId);
                    if(!resizer) return;
                    let isResizing = false;
                    
                    resizer.addEventListener('mousedown', (e) => {
                        isResizing = true;
                        document.body.classList.add('resizing');
                    });
                    
                    document.addEventListener('mousemove', (e) => {
                        if (!isResizing) return;
                        const osRootRect = document.getElementById('os-root').getBoundingClientRect();
                        
                        if (isHorizontal) {
                            const prevPanel = document.getElementById(prevId);
                            if(resizerId === 'ide-splitter-1') {
                                const newWidth = e.clientX - osRootRect.left;
                                if(newWidth > 100 && newWidth < 400) prevPanel.style.width = `${newWidth}px`;
                            } else if (resizerId === 'ide-splitter-2') {
                                const nextPanel = document.getElementById(nextId);
                                const newWidth = osRootRect.right - e.clientX;
                                if(newWidth > 200 && newWidth < 600) nextPanel.style.width = `${newWidth}px`;
                            }
                        } else {
                            const nextPanel = document.getElementById(nextId);
                            const containerRect = nextPanel.parentElement.getBoundingClientRect();
                            const newHeight = containerRect.bottom - e.clientY;
                            if(newHeight > 50 && newHeight < 300) nextPanel.style.height = `${newHeight}px`;
                        }
                    });
                    
                    document.addEventListener('mouseup', () => {
                        if(isResizing) {
                            isResizing = false;
                            document.body.classList.remove('resizing');
                        }
                    });
                };

                setupResizer('ide-splitter-1', 'ide-sidebar-panel', 'ide-editor-panel', true);
                setupResizer('ide-splitter-2', 'ide-editor-panel', 'ide-preview-panel', true);
                setupResizer('ide-splitter-3', 'ide-iframe-container', 'ide-console-panel', false);
            },

            updatePreview() {
                const iframe = document.getElementById('ide-preview-frame');
                if(!iframe) return;
                
                let htmlContent = VFS['index.html'] || '';
                if(VFS['style.css']) {
                    htmlContent = htmlContent.replace('</head>', `<style>${VFS['style.css']}</style></head>`);
                }
                
                const consoleInterceptor = `
                    <script>
                        const originalConsoleLog = console.log;
                        const originalConsoleError = console.error;
                        console.log = function(...args) {
                            window.parent.postMessage({type: 'console', level: 'log', args: args}, '*');
                            originalConsoleLog.apply(console, args);
                        };
                        console.error = function(...args) {
                            window.parent.postMessage({type: 'console', level: 'error', args: args}, '*');
                            originalConsoleError.apply(console, args);
                        };
                        window.onerror = function(msg, url, lineNo, columnNo, error) {
                            window.parent.postMessage({type: 'console', level: 'error', args: [msg + ' at line ' + lineNo]}, '*');
                            return false;
                        };
                    <\/script>
                `;
                
                let scriptTags = '';
                Object.keys(VFS).forEach(file => {
                    if(file.endsWith('.js') && file !== 'app.js') {
                        scriptTags += `<script>${VFS[file]}<\/script>`;
                    }
                });
                if(VFS['app.js']) {
                    scriptTags += `<script>${VFS['app.js']}<\/script>`;
                }

                htmlContent = htmlContent.replace('</body>', `${consoleInterceptor}${scriptTags}</body>`);
                iframe.srcdoc = htmlContent;
                this.logToConsole("Virtual WebServer Context Refreshed.", "info");
            },

            logToConsole(msg, level = 'log') {
                const output = document.getElementById('ide-console-output');
                if(!output) return;
                
                const el = document.createElement('div');
                const time = new Date().toLocaleTimeString([], {hour12:false});
                let colorClass = 'text-gray-300';
                if(level === 'error') colorClass = 'text-rose-400';
                if(level === 'info') colorClass = 'text-sky-400';
                if(level === 'warn') colorClass = 'text-amber-400';
                
                el.className = `whitespace-pre-wrap ${colorClass} border-b border-white/5 pb-1`;
                el.innerHTML = `<span class="text-gray-500 mr-2">[${time}]</span>${typeof msg === 'object' ? JSON.stringify(msg) : msg}`;
                output.appendChild(el);
                output.scrollTop = output.scrollHeight;
            },
            
            clearConsole() {
                const output = document.getElementById('ide-console-output');
                if(output) output.innerHTML = '';
            },

            setupTerminal() {
                const input = document.getElementById('ide-terminal-input');
                if(!input) return;
                
                input.addEventListener('keydown', async (e) => {
                    if(e.key === 'Enter') {
                        const cmd = input.value.trim();
                        input.value = '';
                        if(!cmd) return;
                        
                        this.logToConsole(`$ ${cmd}`, 'info');
                        
                        if(cmd.startsWith('ai ')) {
                            const prompt = cmd.substring(3);
                            await this.runAITerminalAgent(prompt);
                            return;
                        }
                        
                        const args = cmd.split(' ');
                        const command = args[0];
                        
                        try {
                            switch(command) {
                                case 'clear': this.clearConsole(); break;
                                case 'ls': this.logToConsole(Object.keys(VFS).join('    ')); break;
                                case 'cat': 
                                    if(args[1] && VFS[args[1]]) this.logToConsole(VFS[args[1]]);
                                    else this.logToConsole(`cat: ${args[1]}: File not found`, 'error');
                                    break;
                                case 'touch':
                                    if(args[1]) {
                                        if (!VFS[args[1]]) {
                                            VFS[args[1]] = '';
                                            saveVFS();
                                            this.renderFileTree();
                                            this.logToConsole(`Created file: ${args[1]}`);
                                        }
                                    } else {
                                        this.logToConsole("touch: missing filename operand", "error");
                                    }
                                    break;
                                case 'rm':
                                    if(args[1] && VFS[args[1]]) {
                                        delete VFS[args[1]];
                                        saveVFS();
                                        this.renderFileTree();
                                        this.logToConsole(`Removed file: ${args[1]}`);
                                    } else {
                                        this.logToConsole(`rm: cannot remove '${args[1]}': No such file`, 'error');
                                    }
                                    break;
                                default:
                                    this.logToConsole(`bash: ${command}: command not recognized. Try typing: ai "create a style.css template"`, 'error');
                            }
                        } catch (err) {
                            this.logToConsole(err.message, 'error');
                        }
                    }
                });

                window.addEventListener('message', (event) => {
                    if (event.data && event.data.type === 'console') {
                        this.logToConsole(event.data.args.join(' '), event.data.level);
                    }
                });
            },

            // --- STREAMING_CHUNK: Integrating Gemini Terminal Agent for file updates... ---
            async runAITerminalAgent(query) {
                this.logToConsole("Gemini compiler evaluating active VFS system...", "info");
                const apiKey = getApiKey();
                
                if (!apiKey) {
                    // Simulation mode fallback
                    setTimeout(() => {
                        this.logToConsole("System Alert: Custom API Key is absent. Executing simulated patch...", "warn");
                        if (query.includes('css')) {
                            VFS['style.css'] += `\n\n/* Injected Simulated Styles for: ${query} */\n.new-dynamic-ai-class {\n    animation: pulse 2s infinite;\n}`;
                            this.logToConsole("Simulated patch compiled in style.css!");
                        } else {
                            VFS['index.html'] = VFS['index.html'].replace('<h1>Welcome to DevForge OS</h1>', '<h1>Welcome to DevForge OS (Simulated Patch)</h1>');
                            this.logToConsole("Simulated patch compiled in index.html!");
                        }
                        saveVFS();
                        this.openFile(this.currentFile);
                        this.updatePreview();
                    }, 1200);
                    return;
                }

                try {
                    const workspaceContext = JSON.stringify(VFS);
                    const systemPrompt = `You are a professional workspace code agent. You can modify files in the Virtual File System (VFS).
Analyze the VFS state and return a structured JSON array representing updated files.
Keep unmodified files as they are. Format strictly as JSON.

Schema:
[
  {
    "filename": "index.html",
    "content": "updated complete content"
  }
]`;

                    const payload = {
                        contents: [{ parts: [{ text: `VFS State: ${workspaceContext}\nInstruction: ${query}` }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        "filename": { "type": "STRING" },
                                        "content": { "type": "STRING" }
                                    },
                                    "required": ["filename", "content"]
                                }
                            }
                        },
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    if(result.candidates?.[0]?.content?.parts?.[0]?.text) {
                        const fileUpdates = JSON.parse(result.candidates[0].content.parts[0].text);
                        fileUpdates.forEach(update => {
                            VFS[update.filename] = update.content;
                            this.logToConsole(`Successfully patched system VFS asset: ${update.filename}`, "info");
                        });
                        saveVFS();
                        this.renderFileTree();
                        this.openFile(this.currentFile);
                        this.updatePreview();
                    } else {
                        throw new Error("Unable to parse structured model schema.");
                    }
                } catch (err) {
                    this.logToConsole(`Workspace compiler pipeline failed: ${err.message}`, "error");
                }
            },

            toggleChatPanel() {
                const panel = document.getElementById('ide-chat-panel');
                if (panel) panel.classList.toggle('hidden');
            },

            // --- STREAMING_CHUNK: Processing Live Gemini Chat with Web Grounding... ---
            async sendChatPrompt() {
                const inputEl = document.getElementById('ide-chat-input');
                const promptText = inputEl.value.trim();
                if (!promptText) return;

                inputEl.value = '';
                const messagesBox = document.getElementById('ide-chat-messages');

                const userMsg = document.createElement('div');
                userMsg.className = 'bg-purple-950/25 p-2.5 rounded-lg border border-purple-500/20 text-gray-200 self-end ml-4';
                userMsg.innerHTML = `<span class="font-bold text-purple-400">You:</span> ${promptText}`;
                messagesBox.appendChild(userMsg);
                messagesBox.scrollTop = messagesBox.scrollHeight;

                const apiKey = getApiKey();
                const useSearch = document.getElementById('chat-web-grounding').checked;

                // Add temporary loader
                const loadingMsg = document.createElement('div');
                loadingMsg.className = 'bg-[#1b1b1e] p-2.5 rounded-lg border border-white/5 text-gray-400 self-start mr-4';

                        const base64Data = part.inlineData.data;
                        const mimeType = part.inlineData.mimeType;
                        const imageUrl = `data:${mimeType};base64,${base64Data}`;

                        // Render forged image
                        generatedImg.src = imageUrl;
                        loading.classList.add('hidden');
                        patternView.classList.remove('hidden');
                        input.value = '';

                        // Update chat history with model's turn (includes thought signature & base64 image data)
                        this.chatHistory.push(candidate.content);
                        os.showNotification("Asset Forged", "Your live image model was compiled successfully.", "success");
                    } else {
                        throw new Error("Unable to retrieve image part from response candidates.");
                    }
                } catch (err) {
                    loading.classList.add('hidden');
                    emptyEl.classList.remove('hidden');
                    ideApp.logToConsole(`Asset Forge Pipeline Error: ${err.message}`, "error");
                }
            }
        };

        // --- STREAMING_CHUNK: Integrating TTS with Custom Voice Configurations... ---
        // Voice Buddy Application
        const voiceBuddyApp = {
            sessionActive: false,
            canvas: null,
            canvasCtx: null,
            animationFrame: null,
            audioContext: null,
            currentAudio: null,

            init() {
                this.canvas = document.getElementById('voice-wave-canvas');
                if (this.canvas) {
                    this.canvasCtx = this.canvas.getContext('2d');
                    this.drawWaveIdle();
                }
            },

            drawWaveIdle() {
                const draw = () => {
                    if (this.sessionActive) return;
                    
                    this.canvasCtx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.canvasCtx.lineWidth = 1.5;
                    this.canvasCtx.beginPath();
                    this.canvasCtx.strokeStyle = 'rgba(16, 185, 129, 0.25)';
                    
                    const time = Date.now() * 0.003;
                    for (let i = 0; i < this.canvas.width; i++) {
                        const y = this.canvas.height / 2 + Math.sin(i * 0.02 + time) * 6;
                        if (i === 0) this.canvasCtx.moveTo(i, y);
                        else this.canvasCtx.lineTo(i, y);
                    }
                    this.canvasCtx.stroke();
                    this.animationFrame = requestAnimationFrame(draw);
                };
                draw();
            },

            drawWaveActive() {
                const draw = () => {
                    if (!this.sessionActive) return;

                    this.canvasCtx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    
                    const time = Date.now() * 0.015;
                    const waves = 3;
                    const colors = [
                        'rgba(16, 185, 129, 0.4)',
                        'rgba(20, 184, 166, 0.6)',
                        'rgba(56, 189, 248, 0.3)'
                    ];

                    for (let w = 0; w < waves; w++) {
                        this.canvasCtx.beginPath();
                        this.canvasCtx.strokeStyle = colors[w];
                        this.canvasCtx.lineWidth = w === 1 ? 2.5 : 1.5;
                        
                        const amplitude = 18 + Math.sin(time * 0.5) * 8;
                        const frequency = 0.015 + w * 0.005;

                        for (let i = 0; i < this.canvas.width; i++) {
                            const y = this.canvas.height / 2 + Math.sin(i * frequency + time + w) * amplitude * Math.sin(i / this.canvas.width * Math.PI);
                            if (i === 0) this.canvasCtx.moveTo(i, y);
                            else this.canvasCtx.lineTo(i, y);
                        }
                        this.canvasCtx.stroke();
                    }
                    this.animationFrame = requestAnimationFrame(draw);
                };
                draw();
            },

            async toggleVoiceSession() {
                const btn = document.getElementById('btn-mic-toggle');
                const icon = document.getElementById('mic-icon');
                const statusLabel = document.getElementById('voice-status-label');
                const transcript = document.getElementById('voice-transcript');

                if (this.sessionActive) {
                    this.sessionActive = false;
                    btn.className = btn.className.replace('from-rose-500 to-red-500', 'from-emerald-500 to-teal-500');
                    icon.className = 'fas fa-microphone text-lg';
                    statusLabel.innerText = "Voice Engine Standby";
                    statusLabel.className = 'text-[10px] font-bold text-gray-400 tracking-wider text-center uppercase mb-6';
                    cancelAnimationFrame(this.animationFrame);
                    this.drawWaveIdle();
                    transcript.innerHTML += `<span class="text-rose-400">[Microphone suspended]</span><br>`;
                    transcript.scrollTop = transcript.scrollHeight;
                    if(this.currentAudio) this.currentAudio.pause();
                } else {
                    this.sessionActive = true;
                    btn.className = btn.className.replace('from-emerald-500 to-teal-500', 'from-rose-500 to-red-500');
                    icon.className = 'fas fa-microphone-slash text-lg';
                    statusLabel.innerText = "Vocalizer link active";
                    statusLabel.className = 'text-[10px] font-bold text-emerald-400 tracking-wider text-center uppercase mb-6 animate-pulse';
                    cancelAnimationFrame(this.animationFrame);
                    this.drawWaveActive();
                    transcript.innerHTML += `<span class="text-emerald-400">[Vocalizer Live. Select standard prebuilt voices above]</span><br>`;
                    transcript.scrollTop = transcript.scrollHeight;

                    this.playTTS("Hello! Ask me to explain your workspace scripts by clicking 'Explain' in the IDE, and I will narrate the logical structure.");
                }
            },

            // --- STREAMING_CHUNK: Integrating dynamic TTS Voice Engine fallback loop... ---
            async playTTS(text) {
                const transcript = document.getElementById('voice-transcript');
                if (transcript) {
                    transcript.innerHTML += `<span class="text-indigo-400 font-bold">Narrator:</span> <span class="text-gray-300">"${text}"</span><br>`;
                    transcript.scrollTop = transcript.scrollHeight;
                }

                const apiKey = getApiKey();
                const selectedVoice = document.getElementById('voice-select') ? document.getElementById('voice-select').value : 'Zephyr';

                if (!apiKey) {
                    // Browser speech fallback
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.rate = 1.0;
                        window.speechSynthesis.speak(utterance);
                    } else {
                        ideApp.logToConsole("Speech Fallback Unsupported", "warn");
                    }
                    return;
                }

                try {
                    const payload = {
                        contents: [{
                            parts: [{ text: `Say naturally: ${text}` }]
                        }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: {
                                    prebuiltVoiceConfig: { voiceName: selectedVoice }
                                }
                            }
                        },
                        model: "gemini-2.5-flash-preview-tts"
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    const part = result?.candidates?.[0]?.content?.parts?.[0];
                    const audioData = part?.inlineData?.data;
                    const mimeType = part?.inlineData?.mimeType;

                    if (audioData && mimeType && mimeType.startsWith("audio/")) {
                        const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000", 10);
                        const rawBuffer = base64ToArrayBuffer(audioData);
                        const pcm16 = new Int16Array(rawBuffer);
                        const wavBlob = pcmToWav(pcm16, sampleRate);
                        const audioUrl = URL.createObjectURL(wavBlob);

                        if(this.currentAudio) this.currentAudio.pause();
                        this.currentAudio = new Audio(audioUrl);
                        this.currentAudio.play();
                    } else {
                        throw new Error("Unable to extract valid PCM structure.");
                    }
                } catch (err) {
                    ideApp.logToConsole(`TTS Synthesis Engine encountered an error: ${err.message}`, "error");
                    // Web Speech fallback
                    if ('speechSynthesis' in window) {
                        const utterance = new SpeechSynthesisUtterance(text);
                        window.speechSynthesis.speak(utterance);
                    }
                }
            }
        };

        // --- STREAMING_CHUNK: Integrating Settings configurations... ---
        // Settings App Panel
        const settingsApp = {
            init() {
                const keyInput = document.getElementById('settings-api-key-input');
                if (keyInput) keyInput.value = geminiApiKey;
            },

            saveKey() {
                const val = document.getElementById('settings-api-key-input').value.trim();
                geminiApiKey = val;
                localStorage.setItem('devforge_api_key', val);
                os.showNotification("Settings Updated", "API Credentials synchronized successfully.", "success");
                os.updateStatus();
            }
        };

        // Operating System Bootloader Entry
        window.onload = () => {
            setInterval(() => {
                const now = new Date();
                let hours = now.getHours();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                const clockTime = document.getElementById('clock-time');
                const clockDate = document.getElementById('clock-date');
                if (clockTime) clockTime.innerText = `${hours}:${now.getMinutes().toString().padStart(2, '0')} ${ampm}`;
                if (clockDate) clockDate.innerText = now.toLocaleDateString();
            }, 1000);

            document.addEventListener('click', (e) => {
                const menu = document.getElementById('start-menu');
                const btn = document.getElementById('start-btn');
                if(menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
                    menu.classList.remove('open');
                }
            });

            // Auto-boot default core utilities
            setTimeout(() => {
                os.openApp('ide');
                os.updateStatus();
                os.showNotification("DevForge Core Engaged", "Configure your Gemini Key in the Settings panel to enable real-time image editing and voice assistants.", "info");
            }, 400);
        };
    </script>
</body>
